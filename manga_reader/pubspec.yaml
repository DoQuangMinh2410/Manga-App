name: manga_reader
description: "MangaVerse - Ứng dụng đọc truyện tranh Flutter + Firebase."
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Database local ─────────────────────────────────────────────────────
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # ── Local Storage ─────────────────────────────────────────────────────
  shared_preferences: ^2.3.2

  # ── State Management ──────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Firebase (điểm cộng) ──────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # ── Image Handling ────────────────────────────────────────────────────
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  photo_view: ^0.15.0

  # ── Charts (điểm cộng) ────────────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── Utilities ─────────────────────────────────────────────────────────
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
